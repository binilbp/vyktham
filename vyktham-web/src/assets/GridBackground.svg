<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="minorGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path
        d="M 16 0 L 0 0 0 16"
        fill="none"
        stroke="#F1F5F9"
        stroke-width="1"
      />
    </pattern>

    <pattern id="majorGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="url(#minorGrid)" />
      <path
        d="M 80 0 L 0 0 0 80"
        fill="none"
        stroke="#E2E8F0"
        stroke-width="1.5"
      />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="white" />
  <rect width="100%" height="100%" fill="url(#majorGrid)" />
</svg>
